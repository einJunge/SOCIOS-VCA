<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Cartera VCA"/>
  <meta name="theme-color" content="#0f2744"/>
  <meta name="description" content="Buscador de Cartera Activa VCA"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Cartera VCA</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --navy:   #0f2744;
      --blue:   #1a4a8a;
      --accent: #3b82f6;
      --light:  #e8f0fe;
      --bg:     #f0f4fb;
      --card:   #ffffff;
      --text:   #0f2744;
      --muted:  #6b7a99;
      --border: #dce6f5;
      --radius: 16px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overscroll-behavior: none; }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--navy);
      padding: calc(var(--safe-top) + 14px) 20px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .topbar-text h1 { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; color: white; line-height: 1.1; }
    .topbar-text p  { font-size: 0.72rem; color: rgba(255,255,255,0.55); margin-top: 1px; }
    .badge-count {
      margin-left: auto;
      background: var(--accent); color: white;
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
      flex-shrink: 0; display: none;
    }

    /* ── Install banner ── */
    #installBanner {
      display: none;
      background: linear-gradient(135deg, #1a4a8a, #0f2744);
      color: white;
      padding: 12px 16px;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
    }
    #installBanner span { flex: 1; line-height: 1.4; }
    #installBanner button {
      background: white; color: var(--navy);
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      font-family: 'DM Sans', sans-serif;
    }
    #installBanner .close-btn {
      background: transparent; color: rgba(255,255,255,0.6);
      padding: 4px 8px; font-size: 1rem; flex-shrink: 0;
    }

    /* ── Scroll wrap ── */
    .scroll-wrap { padding: 16px 16px calc(var(--safe-bot) + 90px); display: flex; flex-direction: column; gap: 14px; }

    /* ── Upload card ── */
    .upload-card { background: var(--card); border-radius: var(--radius); box-shadow: 0 2px 12px rgba(15,39,68,0.07); overflow: hidden; }
    .upload-label { display: flex; align-items: center; gap: 14px; padding: 18px; cursor: pointer; }
    .upload-label:active { background: #eef3ff; }
    .upload-icon { width: 48px; height: 48px; background: var(--light); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .upload-text strong { display: block; font-size: 0.95rem; font-weight: 600; color: var(--navy); }
    .upload-text span   { font-size: 0.78rem; color: var(--muted); }
    .upload-arrow { margin-left: auto; color: var(--accent); font-size: 1.4rem; }
    #fileInput { display: none; }
    .status-pill {
      margin: 0 14px 14px;
      padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 0.82rem; font-weight: 500;
      display: none; align-items: flex-start; gap: 8px; line-height: 1.4;
    }
    .status-pill.success { background: #e6f4ea; color: #1e6b41; display: flex; }
    .status-pill.error   { background: #fce8e6; color: #c0392b; display: flex; }

    /* ── Search card ── */
    .search-card { background: var(--card); border-radius: var(--radius); box-shadow: 0 2px 12px rgba(15,39,68,0.07); padding: 16px; }
    .search-label { font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; display: block; }
    .search-input-wrap { display: flex; gap: 8px; align-items: center; }
    #searchInput {
      flex: 1; height: 52px; padding: 0 16px;
      font-family: 'DM Sans', sans-serif; font-size: 1.05rem; font-weight: 500;
      color: var(--navy); background: var(--bg);
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    #searchInput:focus { border-color: var(--accent); background: white; }
    #searchInput::placeholder { color: #aab4cc; font-weight: 400; }
    #searchBtn {
      height: 52px; width: 52px; flex-shrink: 0;
      background: var(--navy); color: white;
      border: none; border-radius: var(--radius-sm);
      font-size: 1.4rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    #searchBtn:active { background: var(--blue); transform: scale(0.95); }
    #searchBtn:disabled { background: #c5d3e8; }
    .hint-text { font-size: 0.74rem; color: var(--muted); margin-top: 8px; line-height: 1.5; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-state .em { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    /* ── Results ── */
    #results { display: flex; flex-direction: column; gap: 12px; }
    .result-count-bar { font-size: 0.8rem; color: var(--muted); font-weight: 500; padding: 4px 2px; }
    .no-result { background: var(--card); border-radius: var(--radius); padding: 28px 20px; text-align: center; color: var(--muted); font-size: 0.9rem; box-shadow: 0 2px 12px rgba(15,39,68,0.06); }

    /* ── Result card ── */
    .rcard { background: var(--card); border-radius: var(--radius); box-shadow: 0 2px 12px rgba(15,39,68,0.07); overflow: hidden; animation: slideUp 0.25s ease both; }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .rcard-header { background: var(--navy); padding: 14px 16px; }
    .rcard-header .ref  { font-family:'Syne',sans-serif; font-size:0.78rem; font-weight:700; color:rgba(255,255,255,0.55); letter-spacing:0.5px; }
    .rcard-header .name { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; color:white; margin-top:2px; line-height:1.2; }
    .rcard-body { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; }
    .field.full { grid-column: 1 / -1; }
    .field .flabel { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 3px; }
    .field .fval { font-size: 0.88rem; font-weight: 500; color: var(--navy); word-break: break-word; line-height: 1.3; }
    .field .fval.empty { color: #c0cce0; font-style: italic; }
    .tag { display: inline-flex; align-items: center; gap: 4px; background: #fff3cd; color: #856404; border-radius: 6px; padding: 3px 9px; font-size: 0.78rem; font-weight: 600; }

    /* ── History chips ── */
    .history-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .history-chip {
      background: var(--light); color: var(--blue);
      border: 1.5px solid #c8dbf8; border-radius: 20px;
      padding: 5px 12px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: background 0.1s;
      font-family: 'DM Sans', sans-serif;
    }
    .history-chip:active { background: #d0e4ff; }
    .history-title { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-top: 12px; margin-bottom: 0; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">🗂️</div>
  <div class="topbar-text">
    <h1>Cartera Activa VCA</h1>
    <p>Buscador de referencias</p>
  </div>
  <div class="badge-count" id="badgeCount"></div>
</div>

<!-- Install banner (Android Chrome) -->
<div id="installBanner">
  <span>📲 <strong>Instalar como app</strong> en tu celular para acceso rápido</span>
  <button id="installBtn">Instalar</button>
  <button class="close-btn" id="closeBanner">✕</button>
</div>

<div class="scroll-wrap">

  <!-- Upload -->
  <div class="upload-card">
    <label class="upload-label" for="fileInput">
      <div class="upload-icon">📊</div>
      <div class="upload-text">
        <strong>Cargar archivo Excel</strong>
        <span>Toca para seleccionar .xlsx / .xls</span>
      </div>
      <div class="upload-arrow">›</div>
    </label>
    <input type="file" id="fileInput" accept=".xlsx,.xls"/>
    <div class="status-pill" id="statusPill">
      <span id="statusIcon">✅</span>
      <span id="statusText"></span>
    </div>
  </div>

  <!-- Search -->
  <div class="search-card">
    <span class="search-label">Número de referencia</span>
    <div class="search-input-wrap">
      <input type="text" id="searchInput"
        placeholder="Ej: 1-9-16562 ó 16562"
        inputmode="text" autocomplete="off"
        autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button id="searchBtn" disabled>🔍</button>
    </div>
    <p class="hint-text">Referencia completa o solo el número final.</p>
    <div id="historySection" style="display:none">
      <p class="history-title">Búsquedas recientes</p>
      <div class="history-wrap" id="historyWrap"></div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="em">🔎</div>
    <p>Carga tu archivo Excel y escribe<br>un número de referencia para buscar.</p>
  </div>

  <!-- Results -->
  <div id="results"></div>

</div>

<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  let data = [];
  let searchHistory = [];
  const DATA_KEY    = 'cartera_vca_data_v3';
  const HIST_KEY    = 'cartera_vca_history';
  let deferredPrompt = null;

  // ── Restore data ──
  try {
    const saved = localStorage.getItem(DATA_KEY);
    if (saved) {
      data = JSON.parse(saved);
      showStatus('success', `${data.length} registros listos desde última sesión.`);
      document.getElementById('searchBtn').disabled = false;
      updateBadge(data.length);
    }
  } catch(e) { localStorage.removeItem(DATA_KEY); }

  // History is session-only — cleared on every reload

  // ── PWA Install prompt (Android Chrome) ──
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });

  document.getElementById('closeBanner').addEventListener('click', () => {
    document.getElementById('installBanner').style.display = 'none';
  });

  // ── Helpers ──
  function showStatus(type, msg) {
    const pill = document.getElementById('statusPill');
    pill.className = 'status-pill ' + type;
    document.getElementById('statusIcon').textContent = type === 'success' ? '✅' : '❌';
    document.getElementById('statusText').textContent = msg;
  }

  function updateBadge(n) {
    const b = document.getElementById('badgeCount');
    b.textContent = n.toLocaleString('es') + ' reg.';
    b.style.display = n ? 'block' : 'none';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── File parsing ──
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    showStatus('success', 'Leyendo archivo…');
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        let sheetName = wb.SheetNames.find(n => n.toLowerCase().includes('cartera activa')) || wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });
        if (!rows.length) { showStatus('error', 'El archivo está vacío.'); return; }

        data = rows.map(row => {
          const n = {};
          Object.keys(row).forEach(k => { n[k.toLowerCase().trim()] = row[k]; });
          return {
            referencia:         String(n['referencia'] || '').trim(),
            socio:              String(n['socio'] || '').trim(),
            departamento:       String(n['departamento'] || '').trim(),
            inicio:             String(n['inicio'] || '').trim(),
            vencimiento:        String(n['vencimiento'] || '').trim(),
            ultimo_pago:        String(n['ultimo pago'] || '').trim(),
            ultimo_año_de_pago: String(n['ultimo año de pago'] || n['ultimo ano de pago'] || '').trim(),
            notas:              String(n['notas'] || n['status'] || '').trim(),
          };
        }).filter(r => r.referencia);

        try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); } catch(e) {}
        showStatus('success', `✅ ${data.length} registros cargados — "${sheetName}"`);
        document.getElementById('searchBtn').disabled = false;
        updateBadge(data.length);
        document.getElementById('results').innerHTML = '';
        document.getElementById('emptyState').style.display = '';
      } catch(err) {
        showStatus('error', 'Error al leer el archivo.');
      }
    };
    reader.readAsArrayBuffer(file);
  });

  // ── Search ──
  function doSearch(query) {
    const q = (query || document.getElementById('searchInput').value).trim();
    if (!q || !data.length) return;
    document.getElementById('searchInput').value = q;
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('searchInput').blur();

    // Save to history
    if (!searchHistory.includes(q)) {
      searchHistory.unshift(q);
      if (searchHistory.length > 8) searchHistory.pop();

      renderHistory();
    }

    const matches = data.filter(r => {
      const ref = r.referencia;
      if (ref === q || ref.toLowerCase() === q.toLowerCase()) return true;
      const parts = ref.split('-');
      if (parts[parts.length - 1] === q) return true;
      if (ref.includes(q)) return true;
      return false;
    });

    renderResults(matches, q);
    setTimeout(() => {
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  }

  // ── Render results ──
  function renderResults(matches, q) {
    const container = document.getElementById('results');
    if (!matches.length) {
      container.innerHTML = `<div class="no-result">No se encontraron resultados para <strong>"${esc(q)}"</strong>.</div>`;
      return;
    }

    let html = `<div class="result-count-bar">${matches.length} resultado${matches.length !== 1 ? 's' : ''} para "${esc(q)}"</div>`;

    matches.forEach((r, i) => {
      const notas = r.notas
        ? `<span class="tag">🏷 ${esc(r.notas)}</span>`
        : `<span class="fval empty">Sin notas</span>`;

      html += `
      <div class="rcard" style="animation-delay:${i * 0.05}s">
        <div class="rcard-header">
          <div class="ref">${esc(r.referencia)}</div>
          <div class="name">${esc(r.socio) || '—'}</div>
        </div>
        <div class="rcard-body">
          <div class="field full">
            <div class="flabel">Departamento</div>
            <div class="fval ${!r.departamento?'empty':''}">${esc(r.departamento)||'—'}</div>
          </div>
          <div class="field">
            <div class="flabel">Inicio</div>
            <div class="fval ${!r.inicio?'empty':''}">${esc(r.inicio)||'—'}</div>
          </div>
          <div class="field">
            <div class="flabel">Vencimiento</div>
            <div class="fval ${!r.vencimiento?'empty':''}">${esc(r.vencimiento)||'—'}</div>
          </div>
          <div class="field">
            <div class="flabel">Último Pago</div>
            <div class="fval ${!r.ultimo_pago?'empty':''}">${esc(r.ultimo_pago)||'—'}</div>
          </div>
          <div class="field">
            <div class="flabel">Último Año</div>
            <div class="fval ${!r.ultimo_año_de_pago?'empty':''}">${esc(r.ultimo_año_de_pago)||'—'}</div>
          </div>
          <div class="field full">
            <div class="flabel">Notas</div>
            <div class="fval">${notas}</div>
          </div>
        </div>
      </div>`;
    });

    container.innerHTML = html;
  }

  // ── History chips ──
  function renderHistory() {
    if (!searchHistory.length) { document.getElementById('historySection').style.display = 'none'; return; }
    document.getElementById('historySection').style.display = 'block';
    document.getElementById('historyWrap').innerHTML = searchHistory
      .map(h => `<button class="history-chip" onclick="doSearch('${esc(h)}')">${esc(h)}</button>`)
      .join('');
  }

  // ── Events ──
  document.getElementById('searchBtn').addEventListener('click', () => doSearch());
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
